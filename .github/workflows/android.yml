name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 1. Setup Node con caching delle dipendenze npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package.json'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      # 2. Setup Java con caching automatico di Gradle (Wrapper + Dipendenze)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # 3. Caching della cartella Android di Capacitor
      # - name: Cache Capacitor Android
      #   uses: actions/cache@v4
      #   with:
      #     path: android
      #     key: ${{ runner.os }}-cap-android-v2-${{ hashFiles('package.json') }}

      - name: Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 4. Build dell'APK con ottimizzazione del Gradle Daemon
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
