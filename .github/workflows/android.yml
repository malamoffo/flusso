name: Build Android APK
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Risolve il warning di deprecazione

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Versione stabile più recente dai tuoi log
        cache: 'npm'
        
    - name: Install & Build Web
      run: |
        npm ci
        npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle & Cache
      uses: gradle/actions/setup-gradle@v3 # Sostituisce il caching manuale di setup-java
      with:
        gradle-version: wrapper

    - name: Sync Capacitor
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --build-cache
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
