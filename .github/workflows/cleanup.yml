name: Cleanup Old Workflow Runs

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      days_to_keep:
        description: 'Number of days to keep runs'
        required: true
        default: '30'
      minimum_runs:
        description: 'Minimum number of runs to keep'
        required: true
        default: '10'

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.days_to_keep || '30' }}
          keep_minimum_runs: ${{ github.event.inputs.minimum_runs || '10' }}
